<!--en esta parte es donde guardare datos en clave-valor //solo guarda texto, para
la lista de alumnos tendre q aplanar el texto con json.stringify y luego para
recuperar los datos con json.parse -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de alumnos</title>
  </head>
  <body>
    <h1>Registro estudiantil</h1>
    <div class="form">
      <div class="formbold-main-wrapper">
        <!-- Author: FormBold Team -->
        <!-- Learn More: https://formbold.com -->
        <div class="formbold-form-wrapper">
          <form action="https://formbold.com/s/FORM_ID" method="POST">
            <div class="flex flex-wrap formbold--mx-3">
              <div class="w-full sm:w-half formbold-px-3">
                <div class="formbold-mb-5">
                  <label for="fName" class="formbold-form-label">
                    Nombre
                  </label>
                  <input
                    type="text"
                    name="fName"
                    id="fName"
                    placeholder="Nombre"
                    class="formbold-form-input"
                  />
                </div>
              </div>
              <div class="w-full sm:w-half formbold-px-3">
                <div class="formbold-mb-5">
                  <label for="lName" class="formbold-form-label">
                    Apellido
                  </label>
                  <input
                    type="text"
                    name="lName"
                    id="lName"
                    placeholder="Apellido"
                    class="formbold-form-input"
                  />
                </div>
              </div>
            </div>

            <div class="formbold-mb-5">
              <label for="guest" class="formbold-form-label"> Edad </label>
              <input
                type="number"
                name="guest"
                id="guest"
                placeholder="5"
                class="Edad"
              />
            </div>

            <div>
              <button class="formbold-btn">Guardar</button>
            </div>
          </form>
        </div>
      </div>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: "Inter", sans-serif;
        }
        .formbold-mb-5 {
          margin-bottom: 20px;
        }
        .formbold-pt-3 {
          padding-top: 12px;
        }
        .formbold-main-wrapper {
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px;
        }

        .formbold-form-wrapper {
          margin: 0 auto;
          max-width: 550px;
          width: 100%;
          background: white;
        }
        .formbold-form-label {
          display: block;
          font-weight: 500;
          font-size: 16px;
          color: #07074d;
          margin-bottom: 12px;
        }
        .formbold-form-label-2 {
          font-weight: 600;
          font-size: 20px;
          margin-bottom: 20px;
        }

        .formbold-form-input {
          width: 100%;
          padding: 12px 24px;
          border-radius: 6px;
          border: 1px solid #e0e0e0;
          background: white;
          font-weight: 500;
          font-size: 16px;
          color: #6b7280;
          outline: none;
          resize: none;
        }
        .formbold-form-input:focus {
          border-color: #6a64f1;
          box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
        }

        .formbold-btn {
          text-align: center;
          font-size: 16px;
          border-radius: 6px;
          padding: 14px 32px;
          border: none;
          font-weight: 600;
          background-color: #6a64f1;
          color: white;
          cursor: pointer;
        }
        .formbold-btn:hover {
          box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.05);
        }

        .formbold--mx-3 {
          margin-left: -12px;
          margin-right: -12px;
        }
        .formbold-px-3 {
          padding-left: 12px;
          padding-right: 12px;
        }
        .flex {
          display: flex;
        }
        .flex-wrap {
          flex-wrap: wrap;
        }
        .w-full {
          width: 100%;
        }
        .formbold-radio {
          width: 20px;
          height: 20px;
        }
        .formbold-radio-label {
          font-weight: 500;
          font-size: 16px;
          padding-left: 12px;
          color: #070707;
          padding-right: 20px;
        }
        @media (min-width: 540px) {
          .sm\:w-half {
            width: 50%;
          }
        }
      </style>
    </div>

    <script>
      //primera parte: generar un id

      let miId = localStorage.getItem("id") || "user_" + Math.random();
      localStorage.setItem("id", miId);

      const formulario = document.querySelector("form");

      //segunda parte: escuchamos cuando se envia el formulario
      formulario.addEventListener("submit", async (e) => {
        e.preventDefault(); //evito q la pagina se recarhue al mandar el form

        //capturo los datos del form
        const datos = {
          nombre: document.getElementById("Fname").value,
          apellido: document.getElementById("Lname").value,
          edad: document.getElementById("guest").value,
        };

        //tercera parte: request, envio los datos a mi servidor (POST)
        await fetch("/api/alumnos", {
          method: "POST",
          headers: {
            "Content-type": "application/json",
            sesepomelo: miId, //digo quien soy
          },
          body: JSON.stringify(datos),
        });

        alert("Alumno registrado");
        window.location.reload(); //recargo la pagina para ver los cambios
      });
    </script>
  </body>
</html>
